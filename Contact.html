    <script>
        // Sélectionnez le lien par son ID
        const emailLink = document.getElementById('email-link');

        // Ajoutez un écouteur d'événements de clic au lien
        emailLink.addEventListener('click', function(event) {
            // Empêchez le comportement par défaut du lien
            event.preventDefault();
            
            // Obtenez l'e-mail à partir de l'attribut href du lien
            const email = this.getAttribute('href').replace('mailto:', '');

            // Copiez l'e-mail dans le presse-papiers
            navigator.clipboard.writeText(email)
                .then(() => {
                    // Réussi ! Vous pouvez ajouter ici un message ou une action supplémentaire si nécessaire
                    console.log('Adresse e-mail copiée avec succès : ' + email);
                    alert('Adresse e-mail copiée avec succès : ' + email);
                })
                .catch(err => {
                    // Gestion des erreurs
                    console.error('Erreur lors de la copie de l\'adresse e-mail : ', err);
                });
        });
    </script>
